<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="cardanode — ADAOZ Australian Cardano stake pool">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0693e3"/>
      <stop offset="100%" stop-color="#0479b6"/>
    </linearGradient>
  </defs>

  <!-- Rounded-corner background in Cardano blue -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Southern Cross constellation (Australia) — top-right -->
  <g fill="#ffffff">
    <circle cx="50.5" cy="10.5" r="1.5" opacity="0.85"/>  <!-- Gamma (top) -->
    <circle cx="42.5" cy="16"   r="1.7" opacity="0.95"/>  <!-- Beta (left) -->
    <circle cx="58"   cy="16.5" r="1.2" opacity="0.75"/>  <!-- Delta (right) -->
    <circle cx="51"   cy="22"   r="1.0" opacity="0.7"/>   <!-- Epsilon (small) -->
    <circle cx="50.5" cy="28.5" r="2.0" opacity="1"/>     <!-- Alpha (bottom, brightest) -->
  </g>

  <!-- ADA ₳ symbol, drawn as paths (font-independent so it renders the
       same in every browser and at every size). Outer A outline with
       an inner triangle hole via even-odd fill, plus the crossbar. -->
  <g fill="#ffffff">
    <path fill-rule="evenodd" d="
      M 32 14
      L 18 52
      L 24.5 52
      L 28 42
      L 36 42
      L 39.5 52
      L 46 52
      Z
      M 30 36
      L 34 36
      L 32 30
      Z
    "/>
    <rect x="22.5" y="44" width="19" height="3" rx="0.5"/>
  </g>
</svg>
